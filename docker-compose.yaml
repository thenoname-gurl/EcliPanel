services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      # Database
      DB_TYPE: ${DB_TYPE:-mariadb}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-panel}
      DB_PASS: ${DB_PASS:-changeme}
      DB_NAME: ${DB_NAME:-panel}
      DATABASE_URL: ${DATABASE_URL:-}

      # Auth
      JWT_SECRET: ${JWT_SECRET:-changeme-must-set-this}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      RP_ID: ${RP_ID:-localhost}
      EU_ID_DISABLED: ${EU_ID_DISABLED:-true}

      # Redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

      # Panel URLs
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend:3000}
      PANEL_URL: ${PANEL_URL:-http://frontend:3000}

      # Wings
      WINGS_URL: ${WINGS_URL:-http://localhost:8080}
      WINGS_TOKEN: ${WINGS_TOKEN:-}
      WINGS_ALLOW_INVALID_CERT: ${WINGS_ALLOW_INVALID_CERT:-false}

      # PowerDNS
      PDNS_BASE_URL: ${PDNS_BASE_URL:-http://127.0.0.1:8081/api/v1/servers/localhost}
      PDNS_API_KEY: ${PDNS_API_KEY:-}

      # OAuth - GitHub
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

      # OAuth - Hackclub
      HACKCLUB_CLIENT_ID: ${HACKCLUB_CLIENT_ID:-}
      HACKCLUB_CLIENT_SECRET: ${HACKCLUB_CLIENT_SECRET:-}
      HACKCLUB_REDIRECT_URI: ${HACKCLUB_REDIRECT_URI:-}

      # Cloudflare
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_BASE_ZONE: ${CLOUDFLARE_BASE_ZONE:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_CREATE_SUBZONE: ${CLOUDFLARE_CREATE_SUBZONE:-0}

      # CAPTCHA
      CAPTCHA_SECRET: ${CAPTCHA_SECRET:-}
      CAPTCHA_INVISIBLE_SECRET: ${CAPTCHA_INVISIBLE_SECRET:-}
      CAPTCHA_TTS_VOICE: ${CAPTCHA_TTS_VOICE:-en}
      CAPTCHA_TTS_SPEED: ${CAPTCHA_TTS_SPEED:-150}

      # SMTP (outgoing mail)
      SMTP_HOST: ${SMTP_HOST:-127.0.0.1}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_TLS_ALLOW_INVALID: ${SMTP_TLS_ALLOW_INVALID:-false}
      SMTP_FROM: ${SMTP_FROM:-}

      # Mailcow (mail server management)
      MAILCOW_API_URL: ${MAILCOW_API_URL:-}
      MAILCOW_API_KEY: ${MAILCOW_API_KEY:-}
      MAILCOW_TIMEOUT_MS: ${MAILCOW_TIMEOUT_MS:-30000}
      MAILCOW_RETRIES: ${MAILCOW_RETRIES:-2}

      # Mailbox (inbound email)
      MAILBOX_DOMAIN: ${MAILBOX_DOMAIN:-}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-}
      MAILBOX_INBOUND_SECRET: ${MAILBOX_INBOUND_SECRET:-}
      MAILBOX_SMTP_HOST: ${MAILBOX_SMTP_HOST:-}
      MAILBOX_SMTP_PORT: ${MAILBOX_SMTP_PORT:-587}
      MAILBOX_SMTP_SECURE: ${MAILBOX_SMTP_SECURE:-false}
      MAILBOX_IMAP_HOST: ${MAILBOX_IMAP_HOST:-}
      MAILBOX_IMAP_PORT: ${MAILBOX_IMAP_PORT:-993}
      MAILBOX_IMAP_SECURE: ${MAILBOX_IMAP_SECURE:-true}

      # Dovecot
      DOVECOT_MASTER_USER: ${DOVECOT_MASTER_USER:-}
      DOVECOT_MASTER_PASS: ${DOVECOT_MASTER_PASS:-}
      DOVECOT_MASTER_DOMAIN: ${DOVECOT_MASTER_DOMAIN:-}

      # IMAP fetch schedule
      IMAP_FETCH_CRON: ${IMAP_FETCH_CRON:-}

      # Encryption
      NODE_ENCRYPTION_KEY: ${NODE_ENCRYPTION_KEY:-}
      NODE_PQ_ENCRYPTION_SEED: ${NODE_PQ_ENCRYPTION_SEED:-}

      # Company / Invoice
      COMPANY_NAME: ${COMPANY_NAME:-EclipseSystems}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS:-}
      INVOICE_LOGO_PATH: ${INVOICE_LOGO_PATH:-./frontend/public/assets/icons/logo.png}
      INVOICE_ISSUED_FROM_NAME: ${INVOICE_ISSUED_FROM_NAME:-}
      INVOICE_ISSUED_FROM_ADDRESS: ${INVOICE_ISSUED_FROM_ADDRESS:-}
      INVOICE_ISSUED_FROM_CITY: ${INVOICE_ISSUED_FROM_CITY:-}
      INVOICE_ISSUED_FROM_STATE: ${INVOICE_ISSUED_FROM_STATE:-}
      INVOICE_ISSUED_FROM_ZIP: ${INVOICE_ISSUED_FROM_ZIP:-}
      INVOICE_ISSUED_FROM_COUNTRY: ${INVOICE_ISSUED_FROM_COUNTRY:-}
      INVOICE_ISSUED_FROM_TAX_ID: ${INVOICE_ISSUED_FROM_TAX_ID:-}
      INVOICE_ISSUED_FROM_EMAIL: ${INVOICE_ISSUED_FROM_EMAIL:-}

      # Anti-abuse
      ANTIABUSE_AI_ENABLED: ${ANTIABUSE_AI_ENABLED:-true}
      ABUSE_REPORT_EMAIL: ${ABUSE_REPORT_EMAIL:-}

      # Misc
      DB_LOG_QUERIES: ${DB_LOG_QUERIES:-false}
      DB_MAX_QUERY_MS: ${DB_MAX_QUERY_MS:-200}
      EXIT_ON_UNCAUGHT: ${EXIT_ON_UNCAUGHT:-0}
      ELYSIA_HOURLY_RESTART: ${ELYSIA_HOURLY_RESTART:-false}
      EXPORT_MAX_FILE_BYTES: ${EXPORT_MAX_FILE_BYTES:-0}
      MAILBOX_PASSWORD_ROTATION_CRON: ${MAILBOX_PASSWORD_ROTATION_CRON:-}

      # Server
      PORT: "4000"
      HOST: "0.0.0.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:4000}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:4000}
      NEXT_PUBLIC_WINGS_BASE: ${NEXT_PUBLIC_WINGS_BASE:-http://localhost:8080}
      NEXT_PUBLIC_HACKCLUB_STUDENT_ENABLED: ${NEXT_PUBLIC_HACKCLUB_STUDENT_ENABLED:-true}
      GITHUB_STUDENT_ENABLED: ${GITHUB_STUDENT_ENABLED:-false}
      PORT: "3000"
    depends_on:
      - backend
