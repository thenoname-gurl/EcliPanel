services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-panel}
      MYSQL_USER: ${DB_USER:-panel}
      MYSQL_PASSWORD: ${DB_PASS:-changeme}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER:-panel}
      DB_PASS: ${DB_PASS:-changeme}
      DB_NAME: ${DB_NAME:-panel}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme-super-secret-jwt-key}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      RP_ID: ${RP_ID:-localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend:3000}
      PANEL_URL: ${PANEL_URL:-http://frontend:3000}
      PORT: "4000"
      HOST: "0.0.0.0"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      BACKEND_URL: http://backend:4000
      NEXT_PUBLIC_API_BASE: http://backend:4000
      NEXT_PUBLIC_WINGS_BASE: ${NEXT_PUBLIC_WINGS_BASE:-http://localhost:8080}
      PORT: "3000"
    depends_on:
      - backend

volumes:
  mariadb_data:
  redis_data: