<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel Preview - Screenshot</title>
  <style>
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial,Helvetica,sans-serif;background:#0b1220;color:#e6eef3}
    .wrap{display:flex;align-items:center;justify-content:center;height:100%;padding:20px}
    .card{max-width:1280px;width:100%;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:16px;border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,0.6)}
    img{width:100%;height:auto;border-radius:6px;display:block}
    .meta{margin-top:12px;color:#9aa4b2;display:flex;justify-content:space-between;align-items:center}
    .btn{background:#7c3aed;color:#fff;padding:8px 12px;border-radius:6px;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img src="/preview/preview.png" alt="Panel preview screenshot" />
      <div class="meta">
        <div>Static preview screenshot (replace <code>/preview/preview.png</code> with your image)</div>
        <div><a class="btn" href="/hosting" rel="noopener">Back to Site</a></div>
      </div>
    </div>
  </div>
</body>
</html>
