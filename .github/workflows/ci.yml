name: CI - Build

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend (Bun)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          bun install

      - name: Build backend (typecheck)
        working-directory: backend
        run: |
          bun run build

  antiabuse:
    name: Anti-Abuse (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run anti-abuse cargo check
        working-directory: antiabuse
        run: cargo check

  frontend:
    name: Frontend (pnpm + Node)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

  app:
    name: App packaging
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          cache: true

      - name: Skip app packaging if missing
        run: |
          if [ ! -f app/package.json ]; then
            echo "No app/package.json found. Skipping app packaging."
            exit 0
          fi

      - name: Install app dependencies
        working-directory: app
        run: pnpm install

      - name: Build app wrapper
        working-directory: app
        run: pnpm run build

      - name: Package Android APK
        if: matrix.platform == 'android'
        working-directory: app
        run: pnpm run package:android

      - name: Rename Android output
        if: matrix.platform == 'android'
        run: |
          ANDROID_OUT=$(find app/android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) | head -n 1)
          echo "Found Android build: $ANDROID_OUT"
          cp "$ANDROID_OUT" eclipanelmobile.apk

      - name: Upload Android artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: eclipanelmobile-android
          path: eclipanelmobile.apk
          retention-days: 14

      - name: Package iOS unsigned IPA
        if: matrix.platform == 'ios'
        working-directory: app
        run: pnpm run package:ios:unsigned

      - name: Rename iOS output
        if: matrix.platform == 'ios'
        run: |
          IOS_OUT=$(find app/ios/build -type f -name "*.ipa" | head -n 1)
          echo "Found iOS build: $IOS_OUT"
          cp "$IOS_OUT" eclipanelmobile.ipa

      - name: Upload iOS artifact
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: eclipanelmobile-ios
          path: eclipanelmobile.ipa
          retention-days: 14