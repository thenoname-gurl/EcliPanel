name: CI - Build

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend (Bun)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install backend dependencies
        working-directory: backend
        run: bun install

      - name: Build backend (typecheck)
        working-directory: backend
        run: bun run build

  antiabuse:
    name: Anti-Abuse (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run anti-abuse cargo check
        working-directory: antiabuse
        run: cargo check

  tunnel-client:
    name: Tunnel Client (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run tunnel cargo check
        working-directory: tunnel/client
        run: cargo check

  tunnel-server:
    name: Tunnel Server (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run tunnel cargo check
        working-directory: tunnel/server
        run: cargo check

  frontend:
    name: Frontend (pnpm + Node)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build


  electron:
    name: Electron packaging
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true

      - name: Install app dependencies
        working-directory: app
        run: pnpm install --no-frozen-lockfile

      - name: Package Electron app
        working-directory: app
        run: pnpm run package:electron:${{ matrix.platform }}

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: eclipanel-electron-${{ matrix.platform }}
          path: app/dist/**/*
          retention-days: 14