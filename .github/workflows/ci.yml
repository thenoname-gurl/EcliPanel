name: CI - Build

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend (Bun)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install backend dependencies
        working-directory: backend
        run: bun install

      - name: Build backend (typecheck)
        working-directory: backend
        run: bun run build

  tunnel-client:
    name: Tunnel Client (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run tunnel cargo check
        working-directory: tunnel/client
        run: cargo check

  tunnel-server:
    name: Tunnel Server (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run tunnel cargo check
        working-directory: tunnel/server
        run: cargo check

  frontend:
    name: Frontend (Bun)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Build frontend
        working-directory: frontend
        run: bun run build

  wings:
    name: Wings (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Apply patches and build Wings
        working-directory: wings
        run: |
          cd source && git remote add upstream https://github.com/calagopus/wings || true
          cd ..
          ./manage.sh patch
          cd output && cargo build --release

      - name: Upload Wings binary
        uses: actions/upload-artifact@v4
        with:
          name: wings-rs-linux-x86_64
          path: wings/output/target/release/wings-rs