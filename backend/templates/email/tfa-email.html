<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify Your Login</title>
<style>
  body { font-family: Arial, sans-serif; background-color: #f3f4f6; color: #111827; margin: 0; padding: 20px; }
  .container { max-width: 600px; margin: 0 auto; padding: 32px; background: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { color: #4f46e5; font-size: 22px; margin: 0; }
  .btn { display: inline-block; padding: 12px 32px; background: #8b5cf6; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; }
  .code { font-family: monospace; font-size: 28px; letter-spacing: 6px; color: #6d28d9; text-align: center; padding: 16px; background: #f5f3ff; border-radius: 8px; border: 1px solid #ddd6fe; margin: 16px 0; }
  .footer { font-size: 12px; color: #6b7280; margin-top: 24px; text-align: center; }
  p { line-height: 1.6; }
  @media (prefers-color-scheme: dark) {
    body { background-color: #0a0a12; color: #e0e0e0; }
    .container { background: #12111f; border-color: #2a2545; }
    .header h1 { color: #c4b5fd; }
    .code { color: #8b5cf6; background: #1a1830; border-color: #2a2545; }
    .footer { color: #9ca3af; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Verify Your Login</h1>
  </div>
  <p>Hello {{name}},</p>
  <p>Please verify your login by entering the verification code on the panel.</p>
  <p>Your verification code:</p>
  <div class="code">{{code}}</div>
  <p>This code expires in 1 hour. If you did not create an account, ignore this email.</p>
  <div class="footer">
    &copy; 2026 EclipseSystems under Misiu LLC. All rights reserved.
  </div>
</div>
</body>
</html>
