<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{title}}</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #0a0a12; color: #e0e0e0; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; padding: 32px; background: #12111f; border-radius: 12px; border: 1px solid #2a2545; }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { color: #c4b5fd; font-size: 20px; margin: 0; }
    .btn { display: inline-block; padding: 10px 18px; background: #8b5cf6; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
    .details { font-family: monospace; font-size: 13px; color: #cbd5e1; background: #0f1724; border-radius: 8px; padding: 12px; border: 1px solid #2a2545; margin-top: 12px; white-space: pre-wrap; }
    .details:empty { display: none; }
    .footer { font-size: 12px; color: #777; margin-top: 24px; text-align: center; }
    p { line-height: 1.6; }
    pre { background: #0f1724; border-radius: 8px; padding: 12px; overflow-x: auto; }
    code { font-family: monospace; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{title}}</h1>
    </div>
    <p>{{message}}</p>
    <div class="details">{{details}}</div>
    <div class="footer">&copy; 2026 EclipseSystems under Misiu LLC. All rights reserved.</div>
  </div>
</body>
</html>
