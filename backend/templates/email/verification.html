<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID Verification Status</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f3f4f6; color: #111827; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; padding: 32px; background: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb; }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { color: #4f46e5; font-size: 22px; margin: 0; }
    .btn { display: inline-block; padding: 12px 32px; background: #8b5cf6; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; }
    .details { font-family: monospace; font-size: 13px; color: #334155; background: #f8fafc; border-radius: 8px; padding: 12px; border: 1px solid #e2e8f0; margin-top: 12px; white-space: pre-wrap; }
    .footer { font-size: 12px; color: #6b7280; margin-top: 24px; text-align: center; }
    p { line-height: 1.6; }
    .status { font-weight: bold; color: #4f46e5; }
    @media (prefers-color-scheme: dark) {
      body { background-color: #0a0a12; color: #e0e0e0; }
      .container { background: #12111f; border-color: #2a2545; }
      .header h1 { color: #c4b5fd; }
      .details { color: #cbd5e1; background: #0f1724; border-color: #2a2545; }
      .footer { color: #9ca3af; }
      .status { color: #c4b5fd; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ID Verification Update</h1>
    </div>
    <p>Hello {{name}},</p>
    <p>Your ID verification status has been updated: <span class="status">{{status}}</span>.</p>
    <p>If you have questions, contact support.</p>
    <div class="footer">&copy; 2026 EclipseSystems under Misiu LLC. All rights reserved.</div>
  </div>
</body>
</html>
