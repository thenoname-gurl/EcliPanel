<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>You're Invited!</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #0a0a12; color: #e0e0e0; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; padding: 32px; background: #12111f; border-radius: 12px; border: 1px solid #2a2545; }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { color: #c4b5fd; font-size: 22px; margin: 0; }
    .btn { display: inline-block; padding: 12px 32px; background: #8b5cf6; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; }
    .details { font-family: monospace; font-size: 13px; color: #cbd5e1; background: #0f1724; border-radius: 8px; padding: 12px; border: 1px solid #2a2545; margin-top: 12px; white-space: pre-wrap; }
    .footer { font-size: 12px; color: #777; margin-top: 24px; text-align: center; }
    p { line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Invitation to Join</h1>
    </div>
    <p>Hello {{name}},</p>
    <p>You have been invited to join the organisation <strong>{{orgName}}</strong>.</p>
    <div style="text-align:center; margin: 18px 0;">
      <a href="{{link}}" class="btn">Accept Invitation</a>
    </div>
    <p>If you did not expect this email, you can ignore it.</p>
    <div class="footer">&copy; 2026 EclipseSystems under Misiu LLC. All rights reserved.</div>
  </div>
</body>
</html>
